<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Disney Trip">
<meta name="theme-color" content="#534AB7">
<title>Disney Countdown</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --purple-mid: #7F77DD;
    --purple-pale: #AFA9EC;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --teal-dark: #085041;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --amber-mid: #FAC775;
    --amber-dark: #633806;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --coral-dark: #712B13;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --green-light: #EAF3DE;
    --green-dark: #27500A;
    --bg: #f5f4fb;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #5a5a7a;
    --text-hint: #9090b0;
    --border: rgba(83,74,183,0.12);
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100%;
    height: -webkit-fill-available;
  }

  /* Header */
  .header {
    background: var(--purple);
    padding: var(--safe-top) 1rem 1.1rem;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding-top: 6px;
  }
  .header-title { font-size: 16px; font-weight: 600; color: var(--purple-light); }
  .header-sub { font-size: 12px; color: var(--purple-pale); margin-top: 1px; }
  .countdown-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .cd-unit {
    background: rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: 10px 4px;
    text-align: center;
  }
  .cd-num { font-size: 26px; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -0.5px; }
  .cd-lbl { font-size: 10px; color: var(--purple-pale); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .prog-wrap { margin-top: 10px; }
  .prog-bg { background: rgba(255,255,255,0.18); border-radius: 999px; height: 5px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 999px; background: var(--teal-mid); transition: width 1s linear; }
  .prog-lbl { font-size: 11px; color: var(--purple-pale); margin-top: 4px; text-align: right; }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 11px 4px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-hint);
    text-align: center;
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2.5px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab.active { color: var(--purple); border-bottom-color: var(--purple); }

  /* Scroll area */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 1rem 1rem calc(var(--safe-bottom) + 1rem);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Fact cards */
  .fact-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.9rem;
  }
  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--purple);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .nav-btn:active { background: var(--purple-light); }
  .nav-btn:disabled { color: var(--text-hint); border-color: var(--border); }
  .day-counter { font-size: 12px; color: var(--text-secondary); }
  .fact-card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 1rem 1.1rem;
    margin-bottom: 12px;
  }
  .fact-card.preview { opacity: 0.55; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 9px;
    letter-spacing: 0.02em;
  }
  .fact-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 7px; line-height: 1.4; }
  .fact-body { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }
  .fact-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 11px;
    font-size: 13px;
    font-weight: 600;
    color: var(--purple);
    text-decoration: none;
  }
  .fact-link:active { opacity: 0.7; }
  .preview-label { font-size: 12px; color: var(--text-hint); margin-top: 6px; font-style: italic; }
  .hidden-mickey {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    margin-top: 12px;
    background: var(--amber-light);
    border-radius: 10px;
    padding: 9px 11px;
  }
  .hm-icon { flex-shrink: 0; margin-top: 1px; }
  .hm-label { font-size: 11px; font-weight: 700; color: var(--amber-dark); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .hm-text { font-size: 12px; color: var(--amber-dark); line-height: 1.55; }

  /* Tips */
  .tips-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .tip-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 0.9rem;
  }
  .tip-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 9px;
    font-size: 16px;
  }
  .tip-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
  .tip-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }

  /* Rides */
  .park-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    display: inline-block;
    margin: 1rem 0 0.6rem;
  }
  .rides-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .ride-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    gap: 8px;
  }
  .ride-item:last-child { border-bottom: none; }
  .ride-item:active { background: var(--purple-light); }
  .ride-name { font-size: 14px; color: var(--text); line-height: 1.3; flex: 1; }
  .ride-arrow { font-size: 14px; color: var(--text-hint); flex-shrink: 0; }
  .ride-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">

      <!-- Inner left tower -->

      <polygon points="14,44 20.5,26 27,44" fill="#B0ABE9"/>
      <rect x="17" y="50" width="5" height="7" rx="1" fill="#7B74D4"/>
      <!-- Center main tower -->
      <rect x="27" y="36" width="26" height="50" fill="#E2DFF8"/>
      <!-- Center spire -->
      <polygon points="40,2 33,36 47,36" fill="#8F88DC"/>
      <!-- Spire flag -->
      <line x1="40" y1="2" x2="40" y2="14" stroke="#FAC775" stroke-width="1.5"/>
      <polygon points="40,5 47,9 40,13" fill="#FAC775"/>
      <!-- Gold star at spire top -->

      <!-- Side spires on center -->

      <circle cx="30" cy="23" r="1.5" fill="#FAC775"/>
      <circle cx="50" cy="23" r="1.5" fill="#FAC775"/>
      <!-- Center arch door -->
      <rect x="35" y="68" width="10" height="18" rx="4" fill="#5A51B0"/>
      <!-- Center windows -->
      <rect x="34" y="44" width="6" height="8" rx="2" fill="#AFA9EC"/>
      <rect x="40" y="44" width="6" height="8" rx="2" fill="#AFA9EC"/>
      <rect x="34" y="56" width="6" height="7" rx="2" fill="#AFA9EC"/>
      <rect x="40" y="56" width="6" height="7" rx="2" fill="#AFA9EC"/>
      <!-- Inner right tower -->
      <rect x="53" y="44" width="13" height="42" fill="#D4D0F5"/>
      <polygon points="53,44 59.5,26 66,44" fill="#B0ABE9"/>
      <rect x="56" y="50" width="5" height="7" rx="1" fill="#7B74D4"/>
      <!-- Outer right tower -->
      <rect x="66" y="52" width="12" height="34" fill="#C8C3F0"/>
      <polygon points="66,52 72,36 78,52" fill="#A09AE8"/>
      <rect x="69" y="58" width="4" height="6" rx="1" fill="#7B74D4"/>
      <!-- Battlements on outer towers -->
      <rect x="2" y="49" width="3" height="4" fill="#AFA9EC"/>

      <rect x="66" y="49" width="3" height="4" fill="#AFA9EC"/>
      <rect x="71" y="49" width="3" height="4" fill="#AFA9EC"/>
      <!-- Battlements on inner towers -->
      <rect x="14" y="41" width="3" height="4" fill="#C8C3F0"/>

    <div>
      <div class="header-title">Disney countdown</div>
      <div class="header-sub">July 13, 2026 — the magic awaits</div>
    </div>
  </div>
  <div class="countdown-row">
    <div class="cd-unit"><div class="cd-num" id="cd-d">—</div><div class="cd-lbl">Days</div></div>
    <div class="cd-unit"><div class="cd-num" id="cd-h">—</div><div class="cd-lbl">Hours</div></div>
    <div class="cd-unit"><div class="cd-num" id="cd-m">—</div><div class="cd-lbl">Mins</div></div>

</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(0,this)">Daily facts</button>
  <button class="tab" onclick="switchTab(1,this)">Park tips</button>
  <button class="tab" onclick="switchTab(2,this)">Rides</button>
</div>

<div class="scroll-area">

  <div class="tab-panel active" id="panel-0">
    <div class="fact-nav">
      <button class="nav-btn" id="prev-btn" onclick="changeDay(-1)" disabled>← Prev</button>
      <span class="day-counter" id="day-counter"></span>
      <button class="nav-btn" id="next-btn" onclick="changeDay(1)">Next →</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:0.9rem;">
      <button class="nav-btn" style="flex:1;text-align:center;" onclick="goToDay(0)">← First</button>
      <button class="nav-btn" style="flex:1;text-align:center;" onclick="goToDay(TOTAL_DAYS-1)">Last →</button>
    </div>
    <div id="facts-container"></div>
  </div>

  <div class="tab-panel" id="panel-1">
    <div class="tips-grid" id="tips-container"></div>
  </div>

  <div class="tab-panel" id="panel-2">
    <div id="rides-container"></div>
  </div>

</div>

<script>
const TARGET = new Date('2026-07-13T00:00:00');
const START  = new Date('2026-04-27T00:00:00');
const TOTAL_DAYS = Math.ceil((TARGET - START) / 86400000);

function tick() {
  const now = new Date();
  const diff = TARGET - now;
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '0');
    return;
  }
  document.getElementById('cd-d').textContent = Math.floor(diff / 86400000);
  document.getElementById('cd-h').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  const pct = Math.max(0, Math.min(100, ((now - START) / (TARGET - START)) * 100));
  document.getElementById('prog-fill').style.width = pct.toFixed(1) + '%';
  document.getElementById('prog-lbl').textContent = pct.toFixed(0) + '% of the wait is behind you';
}
tick();
setInterval(tick, 1000);

function switchTab(idx, el) {
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  document.querySelector('.scroll-area').scrollTop = 0;
}

const facts = [
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'The Magic Kingdom opened in 1971', body:'Walt Disney World opened on October 1, 1971, welcoming 10,000 guests on its very first day. Walt Disney himself passed away in 1966 and never saw it completed. It is almost as old as Kristen.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/', lt:'Explore Magic Kingdom', hm:'Magic Kingdom — Main Street U.S.A. — Look at the flower beds just outside the Main Street train station. The gardeners plant flowers in a classic three-circle Mickey silhouette, best seen from the train platform above.', hmLink:'https://www.google.com/search?q=hidden+mickey+main+street+flower+beds+magic+kingdom&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Cinderella Castle hides a secret royal suite', body:'Tucked inside Cinderella Castle is a luxurious royal suite with hand-painted murals and mosaic tile floors. It has never been available to book — guests can only win a stay through Disney sweepstakes promotions.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/cinderella-castle/', lt:'Cinderella Castle', hm:'Magic Kingdom — Cinderella Castle mosaic — Inside the castle walkthrough, look for a Mickey silhouette cleverly worked into the golden tile pattern near the bottom left panel of the mosaic murals.', hmLink:'https://www.google.com/search?q=hidden+mickey+cinderella+castle+mosaic+mural&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Haunted Mansion officially houses 999 happy haunts', body:'The ride\'s ghosts have been counted at exactly 999 — but there\'s always "room for one more." The continuous OmniMover "doom buggy" system, patented by Disney, has kept guests moving through the mansion since 1971.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/haunted-mansion/', lt:'Haunted Mansion', hm:'Magic Kingdom — Haunted Mansion queue — In the outdoor pet cemetery, look for three circular stones near a tombstone that cluster into Mickey\'s head and ears.', hmLink:'https://www.google.com/search?q=hidden+mickey+haunted+mansion+pet+cemetery+tombstone&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#FAECE7;color:#712B13', title:'Underground tunnels called utilidors hide beneath the Magic Kingdom', body:'The entire Magic Kingdom sits one story above ground level. Disney excavated the earth, built a network of service tunnels called utilidors, then raised the park on top — so cast members can travel between lands completely out of guest sight.', link:'https://disneyworld.disney.go.com/faq/', lt:'Disney World FAQ', hm:'Magic Kingdom — Liberty Square — On the wooden facade of Liberty Tree Tavern, look for three circular knots in the wood grain arranged in a Mickey head-and-ears formation.', hmLink:'https://www.google.com/search?q=hidden+mickey+liberty+tree+tavern+wood+knots&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Space Mountain has been thrilling guests since 1975', body:'Space Mountain was the first major indoor roller coaster at Walt Disney World. The darkness makes it feel faster than it is — the coaster only reaches about 28 mph. Disney patented the innovative ride system when it opened.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/space-mountain/', lt:'Space Mountain', hm:'Magic Kingdom — Space Mountain exit — Look at the large planetary mural in the Tomorrowland arcade. Three circular planets in the upper right section are arranged in a Mickey formation.', hmLink:'https://www.google.com/search?q=hidden+mickey+space+mountain+exit+mural+planets&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'EPCOT was originally designed as a real functioning city', body:'Walt Disney envisioned EPCOT (Experimental Prototype Community of Tomorrow) as a city of 20,000 residents — climate controlled, served by monorails, with no cars allowed. After Walt died, the concept evolved into a theme park that opened in 1982.', link:'https://disneyworld.disney.go.com/destinations/epcot/', lt:'Explore EPCOT', hm:'EPCOT — Spaceship Earth — Near the end of the ride, look for three glowing network nodes on the digital map arranged as a Mickey silhouette as your vehicle tilts back.', hmLink:'https://www.google.com/search?q=hidden+mickey+spaceship+earth+network+nodes&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E1F5EE;color:#085041', title:'Tiana\'s Bayou Adventure replaced Splash Mountain in 2024', body:'Reimagined from Splash Mountain, Tiana\'s Bayou Adventure follows Princess Tiana and Louis the alligator through the Louisiana bayou. The five-story plunge at the end remains one of the biggest drops in any Disney attraction.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/tianas-bayou-adventure/', lt:'Tiana\'s Bayou Adventure', hm:'Magic Kingdom — Tiana\'s Bayou Adventure queue — Look at the pots and pans hanging on the kitchen wall in the waiting area. Three round pots grouped together form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+tiana+bayou+adventure+queue+pots+pans&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAEEDA;color:#633806', title:'Disney World covers roughly 40 square miles', body:'Walt Disney World spans about 27,000 acres — approximately the size of San Francisco. Only about a third of that land has been developed. The rest is kept as a natural buffer zone, wetlands, and conservation areas.', link:'https://disneyworld.disney.go.com/', lt:'Disney World home', hm:'Magic Kingdom — Pirates of the Caribbean — As your boat floats past the burning town scene, look at the cannonball holes in the right wall. Three holes form a near-perfect Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+pirates+of+caribbean+cannonball+holes&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAECE7;color:#712B13', title:'Pirates of the Caribbean inspired a billion-dollar film franchise', body:'The ride opened in 1973 and became so beloved it spawned the Pirates of the Caribbean films starting in 2003. Disney then added Jack Sparrow animatronics back into the ride to connect it to the movies. You should call Jack Catpain or Captain Jack for the trip.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/pirates-of-the-caribbean/', lt:'Pirates of the Caribbean', hm:'Magic Kingdom — Pirates queue — In the dungeon waiting area, examine the chains on the stone wall. Three iron rings mounted together form a Mickey silhouette in the dim torchlight.', hmLink:'https://www.google.com/search?q=hidden+mickey+pirates+caribbean+queue+chains+rings&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Animal Kingdom opened on Earth Day 1998', body:'Disney\'s Animal Kingdom covers 580 acres, making it the largest Disney theme park in the world. It deliberately opened on Earth Day — April 22, 1998 — and is home to more than 2,000 real animals across 300 species.', link:'https://disneyworld.disney.go.com/destinations/animal-kingdom/', lt:'Explore Animal Kingdom', hm:'Animal Kingdom — Tree of Life — Near the base of the trunk facing Discovery Island, three circular bark knots form a hidden Mickey among the 325 animal carvings on the tree.', hmLink:'https://www.google.com/search?q=hidden+mickey+tree+of+life+animal+kingdom+bark&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E1F5EE;color:#085041', title:'Expedition Everest sends riders backward in pitch darkness', body:'After the train encounters the Yeti and broken track, it reverses backward in complete darkness before launching forward again. The Yeti animatronic — nicknamed "Disco Yeti" by fans — is one of the largest Audio-Animatronics Disney has ever built. It has not worked since 2008. Chase might not be tall enough to ride this. The Yeti animatronic inside is one of the largest Disney has ever built.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/expedition-everest/', lt:'Expedition Everest', hm:'Animal Kingdom — Expedition Everest queue — On the large expedition map in the Himalayan museum, three circular compass markers are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+expedition+everest+queue+map+compass&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#FAEEDA;color:#633806', title:'Main Street buildings use forced perspective to seem taller', body:'The buildings on Main Street U.S.A. shrink as they rise — the first floor is full size, the second is 5/8 scale, and upper stories are even smaller. This optical illusion makes Cinderella Castle at the end appear much taller than its real 189 feet.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/main-street-usa/', lt:'Main Street U.S.A.', hm:'Magic Kingdom — Main Street Bakery (Starbucks) — Look up at the tin ceiling tiles inside. Three circular floral medallions on the ceiling form a Mickey head-and-ears pattern.', hmLink:'https://www.google.com/search?q=hidden+mickey+main+street+bakery+starbucks+ceiling+tiles&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Over 70,000 cast members work at Walt Disney World', body:'Walt Disney World is one of the largest single-site employers in the entire United States. Employees are called "cast members" because Walt Disney believed every worker was performing in the show, whether visible to guests or not.', link:'https://jobs.disneycareers.com/', lt:'Disney Careers', hm:'EPCOT — Test Track queue — Look at the large vehicle blueprint schematics on the digital walls in the design studio. Three circular headlight designs on one blueprint form a hidden Mickey.', hmLink:'https://www.google.com/search?q=hidden+mickey+test+track+queue+blueprint+headlights&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Tower of Terror delivers a different ride sequence every time', body:'The Twilight Zone Tower of Terror uses a computer-randomized sequence of drops and rises — no two rides are exactly the same. At the top of the 13-story shaft, riders briefly see a panoramic view of the entire Hollywood Studios park. This is Logan\'s favorite ride.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/twilight-zone-tower-of-terror/', lt:'Tower of Terror', hm:'Hollywood Studios — Tower of Terror library queue — Look at the shelves in the dim room. A crystal ball flanked by two smaller spheres forms a Mickey silhouette among the collected objects.', hmLink:'https://www.google.com/search?q=hidden+mickey+tower+of+terror+library+queue+crystal+ball&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Hollywood Studios began as an actual working film studio', body:'Disney\'s Hollywood Studios opened on May 1, 1989, originally named MGM Studios. It was partly a real production facility where guests could watch movies being made — before fully transforming into a themed park over the following decades.', link:'https://disneyworld.disney.go.com/destinations/hollywood-studios/', lt:'Hollywood Studios', hm:'Hollywood Studios — Millennium Falcon: Smugglers Run queue — Inside the Falcon, look at the Dejarik holographic chess board. Three circular playing squares are arranged as a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+millennium+falcon+smugglers+run+dejarik+chess&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E1F5EE;color:#085041', title:'Guardians of the Galaxy: Cosmic Rewind can spin 360 degrees', body:'Cosmic Rewind at EPCOT is one of the longest indoor roller coasters in the world, and one of the first Disney coasters whose vehicles spin to face any direction — including backward — during the ride. It opened in 2022 to enormous demand.', link:'https://disneyworld.disney.go.com/attractions/epcot/guardians-of-the-galaxy-cosmic-rewind/', lt:'Cosmic Rewind', hm:'EPCOT — Guardians queue — In the Xandar gallery exhibit area, look at circular display cases on the wall. Three overlapping lens-shaped cases in one cluster form a recognizable Mickey shape.', hmLink:'https://www.google.com/search?q=hidden+mickey+guardians+galaxy+cosmic+rewind+queue+xandar&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#FAEEDA;color:#633806', title:'Disney pumps custom scents throughout the parks', body:'Hidden "smellitizer" machines throughout the parks emit scents matched to each area — fresh waffle cones on Main Street, sea salt near Pirates of the Caribbean, popcorn near entrance plazas, and pine near wilderness areas.', link:'https://disneyworld.disney.go.com/planning-guides/', lt:'Park planning tips', hm:'Magic Kingdom — Fantasyland — Outside Seven Dwarfs Mine Train, look at the rock landscaping near the entrance. Three boulders arranged on the ground form a Mickey head shape.', hmLink:'https://www.google.com/search?q=hidden+mickey+seven+dwarfs+mine+train+boulders+rocks&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Free ice water is available at every Disney quick-service restaurant', body:'Florida summers are intense — and Disney quietly offers free cups of ice water at any quick-service dining location, just by asking at the counter. It\'s one of the best money-saving secrets across the entire resort.', link:'https://disneyworld.disney.go.com/dining/', lt:'Disney dining', hm:'Animal Kingdom — Flame Tree Barbecue — Look at the decorative ironwork on the pavilion support posts. Three circular rivets clustered on one post form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+flame+tree+barbecue+animal+kingdom+ironwork&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Tron Lightcycle / Run reaches speeds of up to 60 mph', body:'Tron Lightcycle / Run opened at Magic Kingdom in 2023 and is among the fastest coasters in any Disney park worldwide. Riders straddle motorcycle-style vehicles that launch under a sweeping translucent canopy that glows dramatically at night. Everyone must ride this including stripper Cam.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/tron-lightcycle-run/', lt:'Tron Lightcycle / Run', hm:'Magic Kingdom — Tron canopy — From the loading platform, look up at the sweeping white canopy. Three circular cutout portals align into a Mickey silhouette when viewed from a specific angle.', hmLink:'https://www.google.com/search?q=hidden+mickey+tron+lightcycle+run+canopy+portals&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Walt Disney never lived to see Walt Disney World open', body:'Walt Disney passed away on December 15, 1966 — nearly five years before the park opened. When a reporter asked what Walt would have said about the finished resort, brother Roy Disney reportedly replied: "He would have loved it."', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/', lt:'Magic Kingdom history', hm:'Magic Kingdom — Carousel of Progress — In the final scene of the show, look at the holiday meal on the table. Three circular dishes near the center of the table spread are arranged in a Mickey shape.', hmLink:'https://www.google.com/search?q=hidden+mickey+carousel+of+progress+final+scene+table&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E1F5EE;color:#085041', title:'Avatar Flight of Passage simulates riding a living creature', body:'Flight of Passage in Pandora places riders on a banshee — the flying creature from Avatar. The ride seat physically moves and breathes beneath you, simulating the actual muscle movement of a living animal in full flight.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/avatar-flight-of-passage/', lt:'Flight of Passage', hm:'Animal Kingdom — Pandora queue — On the bioluminescent wall murals inside the queue, look for three circular plant pods grouped together that form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+pandora+flight+of+passage+queue+bioluminescent&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#FAEEDA;color:#633806', title:'The parking lot sections are named after Disney characters', body:'Walt Disney World\'s parking lot areas are named after beloved characters — Simba, Pluto, Goofy, Minnie, and more. Cast members record which characters are active that day so guests can find their cars when returning hours later.', link:'https://disneyworld.disney.go.com/plan/parking/', lt:'Parking info', hm:'EPCOT — Journey Into Imagination queue — Look at the floor tiles near the Imagination pavilion entrance. Three circular mosaic tiles of different sizes near the doorway are arranged in a classic Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+journey+into+imagination+queue+floor+tiles&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Cinderella Castle stands 189 feet tall', body:'At 189 feet, Cinderella Castle uses the same forced perspective tricks as the rest of Main Street to appear even grander. The structure contains three shops, a restaurant, and the secret royal suite — and has never actually been lit on fire for any fireworks show.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/cinderella-castle/', lt:'Cinderella Castle', hm:'Magic Kingdom — Be Our Guest Restaurant — In the ballroom dining area, look at the chandelier arms overhead. Three circular light fixtures in one arm grouping are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+be+our+guest+restaurant+chandelier&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Soarin\' Around the World lifts guests 40 feet into the air', body:'Soarin\' at EPCOT suspends riders in hang-glider seats 40 feet in the air in front of a giant IMAX dome screen. Wind, custom scents, and gentle motion complete the illusion of gliding over the Matterhorn, Taj Mahal, and other global landmarks.', link:'https://disneyworld.disney.go.com/attractions/epcot/soarin/', lt:'Soarin\' Around the World', hm:'EPCOT — Soarin\' queue — Look at the large world map mural near the boarding area. Three circular location pins are grouped in a Mickey formation over the California coastline.', hmLink:'https://www.google.com/search?q=hidden+mickey+soarin+queue+world+map+mural&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'The Walt Disney World Monorail has run since opening day in 1971', body:'The Walt Disney World Monorail System is one of the most-used monorail systems in the Western Hemisphere, carrying over 150,000 passengers per day at peak times. Disney originally envisioned monorails as the transportation of the future.', link:'https://disneyworld.disney.go.com/guest-services/monorail/', lt:'Monorail info', hm:'Magic Kingdom — Monorail station — Look at the decorative panels along the beam track above the boarding platform. Three circular rivets on one support bracket are grouped in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+magic+kingdom+monorail+station+rivets&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Star Wars: Rise of the Resistance spans multiple rooms and buildings', body:'Rise of the Resistance at Hollywood Studios is one of the most ambitious Disney attractions ever built. The experience spans a pre-show hangar, a prisoner transport room, a full trackless ride, and an encounter with a life-size AT-AT walker — typically running 18–20 minutes total.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/star-wars-rise-of-the-resistance/', lt:'Rise of the Resistance', hm:'Hollywood Studios — Galaxy\'s Edge — On the carved stone wall outside the Resistance base, look for three circular blast marks that form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+rise+of+resistance+galaxys+edge+stone+wall&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Walt Disney studied how far people walk before littering', body:'Walt Disney discovered people would walk about 30 feet before dropping litter on the ground. Every Disney park is engineered so guests are never more than 30 steps from a trash can — one reason the parks stay so remarkably clean.', link:'https://disneyworld.disney.go.com/', lt:'Disney World home', hm:'Magic Kingdom — Tomorrowland — Near Tomorrowland Terrace, look at the concrete planters. Three circular drain holes on the side of one planter are arranged in a Mickey shape.', hmLink:'https://www.google.com/search?q=hidden+mickey+tomorrowland+planter+drain+holes&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'The Seven Seas Lagoon in front of Magic Kingdom is entirely man-made', body:'The lagoon was excavated when building the park — the removed earth was used to raise the Magic Kingdom above flood level. Disney then designed a waterproofing system so the lagoon retains water, and it has been a water-ski venue and boat recreation area ever since.', link:'https://disneyworld.disney.go.com/', lt:'Disney World home', hm:'EPCOT — The Seas with Nemo & Friends — Look at the large porthole windows into the aquarium. Three circular window bolts around one porthole frame are arranged in a Mickey formation.', hmLink:'https://www.google.com/search?q=hidden+mickey+seas+nemo+friends+living+seas+porthole+bolts&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'The Haunted Mansion stretching room floor actually descends', body:'What appears to be a ceiling rising in the Haunted Mansion stretching room is actually the floor descending 14 feet below ground — bringing guests under the park berm into a tunnel leading to the actual ride building located outside the park boundary.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/haunted-mansion/', lt:'Haunted Mansion', hm:'Magic Kingdom — Haunted Mansion stretching portraits — Look at the wallpaper between the four portrait paintings. Three small circular fleur-de-lis motifs in the pattern cluster into a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+haunted+mansion+stretching+room+wallpaper&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Roy Disney delayed his retirement to open the park for Walt', body:'After Walt died, brother Roy delayed his own retirement to see the resort through to completion. He renamed it "Walt Disney World" to honor his brother, attended the opening on October 1, 1971, and passed away just 78 days later — his life\'s work complete.', link:'https://disneyworld.disney.go.com/', lt:'Disney World history', hm:'Magic Kingdom — Town Square — Look at the circular manhole covers embedded in the brick pavement near the flagpole. Three smaller covers near the main one form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+magic+kingdom+town+square+manhole+covers&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Big Thunder Mountain used real antique mining equipment in its design', body:'Big Thunder Mountain Railroad opened at Magic Kingdom in 1980, inspired by the mines of the American Southwest. Disney Imagineers collected genuine antique mining equipment and embedded it throughout the queue and ride to give it an authentic feel.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/big-thunder-mountain-railroad/', lt:'Big Thunder Mountain', hm:'Magic Kingdom — Big Thunder Mountain queue — Look at the large wooden barrel groupings inside the mine queue. Three circular barrel tops in one stack are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+big+thunder+mountain+queue+barrels&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Disney created a proprietary paint color called Go Away Green', body:'Disney developed a paint color called "Go Away Green" specifically to camouflage structures they don\'t want guests to notice — utility buildings, fences, equipment. The color is designed to blend into peripheral vision so the eye naturally skips over it.', link:'https://disneyworld.disney.go.com/', lt:'Disney secrets', hm:'EPCOT — Living with the Land — On the boat ride through the greenhouse cave section, look at three circular lily pads floating near the bank on the left side that cluster into a Mickey formation.', hmLink:'https://www.google.com/search?q=hidden+mickey+living+with+the+land+lily+pads&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Walt Disney World operates under its own special government district', body:'Disney operates under the Central Florida Tourism Oversight District (formerly the Reedy Creek Improvement District) — a special government entity that grants Disney many powers of a municipality, including its own fire department, utilities, and building codes.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Magic Kingdom — Jungle Cruise — As your boat passes the elephant bathing pool scene, look at circular lily pad groupings floating in the water. One set of three forms a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+jungle+cruise+elephant+pool+lily+pads&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Peter Pan\'s Flight uses a suspended track to simulate flying', body:'Despite being a gentle classic ride, Peter Pan\'s Flight consistently has some of the longest standby wait times in Magic Kingdom. The suspended track system makes riders feel as if they\'re soaring over London — a sensation guests of all ages never tire of.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/peter-pans-flight/', lt:'Peter Pan\'s Flight', hm:'Magic Kingdom — Peter Pan\'s Flight queue — In the nursery-themed indoor queue, look at the shadow murals on the wall. Three circular clock faces in the mural are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+peter+pan+flight+queue+nursery+mural&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'EPCOT\'s World Showcase wraps around a 40-acre lagoon', body:'World Showcase opened with EPCOT in 1982 and features 11 country pavilions ringing a vast lagoon. Each pavilion is staffed by real residents of that country — a detail Disney insists on to preserve cultural authenticity throughout.', link:'https://disneyworld.disney.go.com/destinations/epcot/world-showcase/', lt:'World Showcase', hm:'EPCOT — France pavilion — On the ornate iron fence surrounding the pavilion, look for three circular decorative iron medallions on one fence panel that form a Mickey head-and-ears shape.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+france+pavilion+iron+fence&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Mission: SPACE gives riders real centrifugal g-forces', body:'Mission: SPACE at EPCOT offers two experiences: the intense Orange Mission simulates a trip to Mars with genuine g-forces created by spinning centrifuge pods, and the gentler Green Mission orbits Earth without the spinning. The Orange track is one of Disney\'s most physically intense attractions.', link:'https://disneyworld.disney.go.com/attractions/epcot/mission-space/', lt:'Mission: SPACE', hm:'EPCOT — Mission: SPACE queue — Look at the large mission patch display on the wall. Three circular mission badge designs grouped together form a Mickey silhouette among the collection.', hmLink:'https://www.google.com/search?q=hidden+mickey+mission+space+queue+mission+patches&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Disney cast members are trained never to say "I don\'t know"', body:'Disney University — the internal training program — teaches cast members to respond to any guest question with either the answer, or to walk the guest to someone who can help. Saying "I don\'t know" and leaving someone stranded is specifically discouraged in training.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Hollywood Studios — Toy Story Land — Look at the giant Scrabble tiles decorating the land\'s entrance walls. Three circular letter tile borders in a row are positioned to form a Mickey ear shape above one tile.', hmLink:'https://www.google.com/search?q=hidden+mickey+toy+story+land+scrabble+tiles&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Disney World serves over 100 million meals every year', body:'The resort\'s 200+ dining locations serve enormous quantities: approximately 10 million pounds of citrus, 9 million pounds of chicken, and 1.4 million hot dogs are consumed annually across the four parks and resort hotels combined.', link:'https://disneyworld.disney.go.com/dining/', lt:'Disney dining', hm:'Magic Kingdom — Columbia Harbour House — Inside the restaurant, look at the nautical decor on the walls. Three circular portholes are arranged in a classic Mickey silhouette near one of the dining room windows.', hmLink:'https://www.google.com/search?q=hidden+mickey+columbia+harbour+house+portholes&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Kilimanjaro Safaris covers 110 acres of real African savanna landscape', body:'The safari at Animal Kingdom crosses a 110-acre open habitat where real African animals roam freely. Animals are not trained to appear on cue — Disney designs the landscape and feeding areas so natural animal behavior naturally places them where guests can see them.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/kilimanjaro-safaris/', lt:'Kilimanjaro Safaris', hm:'Animal Kingdom — Kilimanjaro Safaris entrance — Look at the large wooden entry sign. Three circular nailhead studs in the sign\'s frame near the bottom left corner form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+kilimanjaro+safaris+entrance+sign+nails&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'The New Fantasyland expansion was Magic Kingdom\'s biggest ever', body:'The 2012–2014 New Fantasyland expansion added Be Our Guest Restaurant, Seven Dwarfs Mine Train, Under the Sea – Journey of the Little Mermaid, and Princess Fairytale Hall — more than doubling the footprint of Fantasyland in one of Disney\'s most ambitious single-park expansions.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/fantasyland/', lt:'Fantasyland', hm:'Magic Kingdom — Under the Sea queue — In the cave-style queue for the Little Mermaid ride, look at the coral formations on the walls. Three circular coral polyp openings cluster together in a Mickey shape.', hmLink:'https://www.google.com/search?q=hidden+mickey+under+the+sea+journey+little+mermaid+queue+coral&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Slinky Dog Dash is themed as a toy Andy actually assembled', body:'In Toy Story Land, the entire landscape is designed as Andy\'s backyard — and Slinky Dog Dash is themed as a coaster Andy built using real toy pieces. The track supports use actual Tinkertoy parts, and the coaster cars look like a giant stretched Slinky Dog.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/slinky-dog-dash/', lt:'Slinky Dog Dash', hm:'Hollywood Studios — Toy Story Land — Look at the Tinkertoy connector pieces holding up the Slinky Dog Dash track. Three circular connectors on one support form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+slinky+dog+dash+tinkertoy+supports&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'The Liberty Tree is a real 135-year-old live oak', body:'The Liberty Tree in Liberty Square was transplanted onto park property before opening — a genuine 135-year-old live oak moved by crane over several days. The 13 lanterns hanging from its branches represent the original 13 American colonies.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/liberty-square/', lt:'Liberty Square', hm:'Magic Kingdom — Liberty Square — Look at the base of the Liberty Tree. Three circular root formations where the trunk meets the ground are arranged in a Mickey silhouette when viewed from the riverboat dock.', hmLink:'https://www.google.com/search?q=hidden+mickey+liberty+tree+roots+magic+kingdom&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Walt Disney World has its own dedicated zip code: 32830', body:'The property is so large it functions like a small city — with its own power systems, roads, fire department, and postal code. Disney owns multiple utility companies on the property and manages its own wastewater treatment, all under the special government district.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'EPCOT — Canada pavilion — Look at the rocky stone cliff wall of the pavilion. Three circular stone formations on the face are arranged in a Mickey silhouette pattern within the natural-looking rockwork.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+canada+pavilion+stone+wall&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Frozen Ever After opened in the Norway pavilion in 2016', body:'The beloved but aging Maelstrom ride in EPCOT\'s Norway pavilion was replaced by Frozen Ever After in 2016. The Norway pavilion was originally built hoping Norway would become a park sponsor — a deal that never materialized, leaving Norway pavilion without a corporate partner to this day.', link:'https://disneyworld.disney.go.com/attractions/epcot/frozen-ever-after/', lt:'Frozen Ever After', hm:'EPCOT — Norway pavilion — Look at the stave church exterior facade near Frozen Ever After. Three circular decorative shield motifs on the wooden facade are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+norway+pavilion+stave+church+shields&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'The Tree of Life took 18 months to carve', body:'The Tree of Life in Animal Kingdom is a 14-story fiberglass and steel structure covered in 325 animal carvings. A team of sculptors took 18 months to design and carve every species into the surface, and the structure houses a 430-seat theater inside its roots.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/its-tough-to-be-a-bug/', lt:'Tree of Life & It\'s Tough to be a Bug!', hm:'Animal Kingdom — Tree of Life — Look at the large elephant carving on the lower trunk. The three toenail circles on the elephant\'s front foot form a subtle Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+tree+of+life+elephant+toenails&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Rock \'n\' Roller Coaster launches from 0 to 57 mph in 2.8 seconds', body:'The Rock \'n\' Roller Coaster at Hollywood Studios uses a linear induction motor to catapult riders from a standstill to 57 mph in under 3 seconds — one of the most intense launches in any Disney park. The coaster runs entirely in the dark to three Aerosmith tracks.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/rock-n-roller-coaster/', lt:'Rock \'n\' Roller Coaster', hm:'Hollywood Studios — Rock \'n\' Roller Coaster queue — Look at the recording studio wall of gold and platinum records. Three circular record labels in a grouping on the wall form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+rock+roller+coaster+queue+records&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Disney cast members are trained to point with two fingers', body:'Disney cast members worldwide are taught never to point with a single finger — considered rude in many cultures. Instead they point with two fingers or an open hand. Walt Disney reportedly started this policy after observing how dismissive one-finger pointing appeared in early park videos.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Magic Kingdom — Carousel of Progress — In the 1940s kitchen scene, look at the table setting. Three circular plates in the scene are arranged in a Mickey silhouette pattern.', hmLink:'https://www.google.com/search?q=hidden+mickey+carousel+of+progress+1940s+kitchen+plates&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'EPCOT\'s Food and Wine Festival is the world\'s largest outdoor food event', body:'EPCOT\'s International Food & Wine Festival — held each fall — has grown into the largest outdoor food and wine event on Earth, featuring 30+ global food booths, celebrity chef events, and concerts, with over 20,000 attending on peak festival days.', link:'https://disneyworld.disney.go.com/events-tours/epcot/epcot-international-food-and-wine-festival/', lt:'Food & Wine Festival', hm:'EPCOT — World Showcase promenade — Look at the circular cast iron grate covers in the walkway near the America pavilion. Three grates in a cluster form a Mickey silhouette when viewed from above.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+world+showcase+pavement+grates&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Seven Dwarfs Mine Train cars swing side to side independently', body:'The Seven Dwarfs Mine Train uses a unique swinging car system — the vehicles pivot independently side to side as they round curves, making the experience feel different depending on your seat. The interactive gem-sorting tables in the queue are also guest favorites.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/seven-dwarfs-mine-train/', lt:'Seven Dwarfs Mine Train', hm:'Magic Kingdom — Seven Dwarfs Mine Train queue — At the gem-sorting interactive tables, look at the jewel patterns on the screen. Three round gems in one grouping form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+seven+dwarfs+mine+train+interactive+queue+gems&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Pandora: The World of Avatar was nearly a decade in development', body:'Pandora opened at Animal Kingdom in May 2017 after nearly a decade of collaboration between Disney Imagineers and director James Cameron. The floating mountains use cantilever engineering with living plants actually growing from the rock faces — no artificial foliage.', link:'https://disneyworld.disney.go.com/destinations/animal-kingdom/pandora-world-of-avatar/', lt:'Pandora — World of Avatar', hm:'Animal Kingdom — Pandora at night — Look at the bioluminescent ground plants near the Valley of Mo\'ara. Three circular glowing plant pods cluster together forming a Mickey silhouette in the ground cover after dark.', hmLink:'https://www.google.com/search?q=hidden+mickey+pandora+bioluminescent+plants+night&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Remy\'s Ratatouille Adventure makes you feel the size of a mouse', body:'Remy\'s Ratatouille Adventure at EPCOT uses trackless ride vehicles, giant oversized set pieces, and forced perspective to make guests feel as tiny as a mouse exploring Gusteau\'s famous Paris restaurant entirely from floor level.', link:'https://disneyworld.disney.go.com/attractions/epcot/remys-ratatouille-adventure/', lt:'Remy\'s Ratatouille Adventure', hm:'EPCOT — Remy\'s Ratatouille queue — Look at the giant cheese wheels stacked in the kitchen storage area. Three circular cheese rounds stacked in one corner form a Mickey head-and-ears silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+remy+ratatouille+queue+cheese+wheels&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Disney plants over 3 million flowers across the resort every single year', body:'The Walt Disney World horticulture team replants approximately 3 million annuals, shrubs, and topiaries each year. Plants are swapped out overnight — sometimes mid-season — to ensure peak-bloom appearance at all times. Disney operates its own on-property nursery to support this.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'EPCOT — International Flower & Garden Festival — During the festival, look at the Mickey and Minnie topiary near Future World. The three circular forms of Mickey\'s head in the sculpted greenery are among the most photographed things at EPCOT.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+flower+garden+festival+topiary&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Jungle Cruise skippers write much of their own material', body:'Jungle Cruise skippers are encouraged to improvise and add personal touches to their delivery. Disney periodically updates the official script — and in 2021 overhauled the ride to remove outdated portrayals of indigenous peoples while keeping the beloved puns intact.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/jungle-cruise/', lt:'Jungle Cruise', hm:'Magic Kingdom — Jungle Cruise — Look at the hippo pool scene. Three circular bubbles rising from submerged hippos cluster into a Mickey silhouette on the water\'s surface.', hmLink:'https://www.google.com/search?q=hidden+mickey+jungle+cruise+hippo+pool+bubbles&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Disney World encompasses four theme parks and two water parks', body:'The resort includes Magic Kingdom, EPCOT, Hollywood Studios, and Animal Kingdom, plus Typhoon Lagoon and Blizzard Beach water parks, Disney Springs, a sports complex, and over 25 resort hotels — all on one contiguous, privately governed property.', link:'https://disneyworld.disney.go.com/', lt:'Disney World overview', hm:'Disney Springs — The LEGO Store — In the LEGO display window, look for a LEGO mosaic on the wall. Three circular LEGO stud patterns are deliberately arranged in a Mickey silhouette within the display artwork.', hmLink:'https://www.google.com/search?q=hidden+mickey+disney+springs+lego+store+mosaic&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Mickey & Minnie\'s Runaway Railway has no height requirement at all', body:'Mickey & Minnie\'s Runaway Railway at Hollywood Studios is the first-ever Disney park ride built around Mickey Mouse himself, and the first to carry no height requirement whatsoever — making the attraction fully accessible to guests of every age and ability.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/mickey-minnies-runaway-railway/', lt:'Runaway Railway', hm:'Hollywood Studios — Runaway Railway — Look at the movie screen in the pre-show area. Three circular camera lens elements in the movie projector visible in the scene are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+mickey+minnie+runaway+railway+projector&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'The Morocco pavilion at EPCOT was built by actual Moroccan artisans', body:'The Morocco pavilion in EPCOT\'s World Showcase was constructed entirely by craftspeople sent from Morocco by the Moroccan government — one of the only pavilions built and maintained this way. The detailed tilework, stucco, and carved plaster cannot be replicated by standard construction methods.', link:'https://disneyworld.disney.go.com/destinations/epcot/world-showcase/', lt:'World Showcase', hm:'EPCOT — Morocco pavilion — Look at the intricate tilework on the fountain in the pavilion courtyard. Three circular mosaic tile groupings on the fountain base form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+morocco+pavilion+fountain+tiles&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Magic Kingdom\'s nightly fireworks use roughly 750 lbs of shells', body:'The Happily Ever After fireworks show uses approximately 750 lbs of fireworks shells per performance. Contrary to popular belief, the shells are not fired from the castle — they\'re launched from behind the earthen berm ringing the park, to keep the castle safely in view as the backdrop.', link:'https://disneyworld.disney.go.com/entertainment/', lt:'Magic Kingdom entertainment', hm:'Magic Kingdom — Main Street during fireworks — Look at the Mickey-shaped confetti that rains down during certain fireworks finales. The three-circle Mickey silhouette shapes are intentionally cut into the confetti distributed over the crowd.', hmLink:'https://www.google.com/search?q=hidden+mickey+magic+kingdom+fireworks+confetti+shape&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Na\'vi River Journey features one of Disney\'s most advanced animatronics', body:'Na\'vi River Journey in Animal Kingdom\'s Pandora is a serene bioluminescent boat ride leading to the Shaman of Songs — a figure capable of dozens of distinct facial expressions and fluid, lifelike body movement, making her among the most technically sophisticated Disney has ever created.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/navi-river-journey/', lt:'Na\'vi River Journey', hm:'Animal Kingdom — Na\'vi River Journey — During the ride, look at the glowing root clusters on the river banks near the Shaman. Three circular bioluminescent pods cluster into a Mickey silhouette in the undergrowth.', hmLink:'https://www.google.com/search?q=hidden+mickey+navi+river+journey+bioluminescent+pods&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Spaceship Earth\'s geodesic sphere weighs 16 million pounds', body:'EPCOT\'s iconic Spaceship Earth is covered in 11,324 triangular aluminum panels and weighs approximately 16 million pounds. A sophisticated gutter system channels rainwater away from the sphere invisibly underground, so water never drips from the structure in any direction.', link:'https://disneyworld.disney.go.com/attractions/epcot/spaceship-earth/', lt:'Spaceship Earth', hm:'EPCOT — Spaceship Earth exterior — Look at the triangular panel seams near the base of the sphere. Three triangular panels meeting at one junction point create a subtle Mickey ear effect in their geometric arrangement.', hmLink:'https://www.google.com/search?q=hidden+mickey+spaceship+earth+exterior+panels&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Toy Story Mania! uses 4D spring-action shooting technology', body:'Toy Story Mania! fires virtual toys at carnival targets using spring-action shooter cannons — no real projectiles. The 4D effects (air puffs, water sprays, vibration) sync perfectly with the screen action, making each carnival game feel surprisingly physical and competitive.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/toy-story-mania/', lt:'Toy Story Mania!', hm:'Hollywood Studios — Toy Story Mania queue — Look at the giant game box artwork lining the walls. Three circular game token images in one panel are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+toy+story+mania+queue+game+tokens&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Every area of every Disney park has its own custom music score', body:'Disney\'s park music is entirely custom-composed and arranged for each themed area — and the loops are engineered to be undetectable. The ambient music loop for Main Street U.S.A. alone runs longer than an hour, so guests never consciously notice it repeating.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Magic Kingdom — Frontierland — Look at the wooden barrel clusters outside Pecos Bill Tall Tale Inn. Three circular barrel tops in one stack form a Mickey silhouette when viewed from the pathway.', hmLink:'https://www.google.com/search?q=hidden+mickey+frontierland+barrels+pecos+bill&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Walt Disney World has over 300 miles of underground infrastructure', body:'Beneath the entire resort runs a subterranean network rivaling a small city — over 300 miles of pipes, cables, and conduits carrying electricity, chilled water, steam, and fiber optic communications to every corner of the 40-square-mile property.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'EPCOT — The Land pavilion — Look at the circular skylights in the main atrium above the boat ride loading area. Three skylights of varying size are arranged in a Mickey head shape when viewed from ground level.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+land+pavilion+skylights+atrium&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'DINOSAUR features one of the largest animatronics in any Disney ride', body:'The DINOSAUR attraction at Animal Kingdom uses large EMV simulator vehicles to transport guests 65 million years back in time through a pitch-dark prehistoric world. The Carnotaurus animatronic at the climax of the ride is one of the most massive Disney has ever constructed. It closed February 1 2026. It is almost as big as Lane\'s head.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/dinosaur/', lt:'DINOSAUR', hm:'Animal Kingdom — DINOSAUR queue — Look at the fossil display cases in the museum-style waiting area. Three circular fossil ammonites in one display case are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+dinosaur+ride+queue+fossil+display&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Magic Kingdom radiates outward in a hub-and-spoke design', body:'Magic Kingdom\'s six themed lands — Main Street U.S.A., Adventureland, Frontierland, Liberty Square, Fantasyland, and Tomorrowland — all radiate from a central hub in front of Cinderella Castle. Walt Disney designed this layout so guests always know which direction the castle is.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/', lt:'Magic Kingdom map', hm:'Magic Kingdom — Central Hub — Look at the round planting beds in front of the castle. Three circular flower beds of different sizes are arranged to form a Mickey silhouette when viewed from the castle steps.', hmLink:'https://www.google.com/search?q=hidden+mickey+magic+kingdom+central+hub+flower+beds&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Kali River Rapids\' rafts spin randomly — so soakings are unpredictable', body:'Kali River Rapids at Animal Kingdom seats eight riders on a circular raft that rotates as it floats — meaning who gets drenched is entirely random. The ride also tells an environmental story about illegal deforestation, making it one of the more socially conscious attractions in the parks.', link:'https://disneyworld.disney.go.com/attractions/animal-kingdom/kali-river-rapids/', lt:'Kali River Rapids', hm:'Animal Kingdom — Kali River Rapids loading dock — Look at the circular mooring rope loops tied to posts near the raft dock. Three loops in a cluster form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+kali+river+rapids+loading+dock+rope+loops&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'"Imagineer" blends imagination and engineering — and started with Walt', body:'Disney\'s internal design division was originally called WED Enterprises — Walter Elias Disney\'s initials. It was renamed Walt Disney Imagineering in 1986. The term "Imagineer" intentionally blends imagination and engineering to reflect the dual nature of the work.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Hollywood Studios — Indiana Jones Epic Stunt Spectacular queue — Look at the crates and boxes stacked in the pre-show area. Three circular wooden crate openings in one stack are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+indiana+jones+stunt+show+queue+crates&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Disney World generates much of its own electricity on property', body:'Walt Disney World operates natural gas cogeneration facilities and large on-property solar farms that produce a significant share of the resort\'s electricity. Disney has committed to reaching net-zero carbon emissions by 2030 as part of its environmental goals.', link:'https://disneyworld.disney.go.com/', lt:'Disney sustainability', hm:'Magic Kingdom — The Hall of Presidents — Look at the circular presidential seal decorations on the walls of the waiting area. Three seal motifs in a row on one panel are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+hall+of+presidents+queue+seals&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'The Living Seas at EPCOT holds 5.7 million gallons of salt water', body:'The Living Seas pavilion at EPCOT houses one of the largest inland salt-water aquariums in the world — a 5.7-million-gallon tank inhabited by sharks, sea turtles, dolphins, manatees, rays, and thousands of fish, all visible through massive viewing windows.', link:'https://disneyworld.disney.go.com/attractions/epcot/seas-with-nemo-and-friends/', lt:'The Seas with Nemo & Friends', hm:'EPCOT — The Seas pavilion — Look at the bolts around the large circular observation windows into the aquarium. Three bolts at the top of one window are spaced in a Mickey head-and-ears formation.', hmLink:'https://www.google.com/search?q=hidden+mickey+epcot+seas+nemo+aquarium+window+bolts&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Blizzard Beach was built around a fictional snowstorm backstory', body:'Disney\'s Blizzard Beach water park opened in 1995 around the story of a rare Florida snowstorm that prompted a failed ski resort — until the snow melted, turning it into a waterpark. Summit Plummet, at 120 feet, remains one of the tallest free-fall water slides in the world.', link:'https://disneyworld.disney.go.com/destinations/blizzard-beach/', lt:'Blizzard Beach', hm:'Blizzard Beach — Wave pool area — Look at the circular inner tube racks near the wave pool entrance. Three round tubes hanging on one rack form a perfect Mickey silhouette when viewed from the beach area.', hmLink:'https://www.google.com/search?q=hidden+mickey+blizzard+beach+wave+pool+inner+tubes&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Lightning Lane replaced FastPass+ as Disney\'s reservation system in 2021', body:'Disney replaced its free FastPass+ system with the paid Lightning Lane service in 2021. Genie+ gives access to most rides, while individual Lightning Lane selections are sold separately for the most popular attractions like Tron and Rise of the Resistance.', link:'https://disneyworld.disney.go.com/plan/lightning-lane/', lt:'Lightning Lane planning', hm:'Magic Kingdom — Tomorrowland Transit Authority PeopleMover station — Look at the circular porthole windows on the station walls. Three portholes of descending size near one corner form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+tomorrowland+transit+authority+peoplemover+portholes&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Walt Disney coined the term "weenie" for park visual landmarks', body:'Walt Disney used the word "weenie" to describe a visual magnet that pulls guests through the park — like a hot dog held in front of a dog. Cinderella Castle is the ultimate weenie of Magic Kingdom, visible from almost every vantage point and always drawing guests toward the center.', link:'https://disneyworld.disney.go.com/destinations/magic-kingdom/', lt:'Magic Kingdom design', hm:'Magic Kingdom — Adventureland — Look at the carved tiki faces on the wooden entrance posts near the Enchanted Tiki Room. Three circular eye carvings on one post are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+adventureland+tiki+room+post+carvings&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Magic Kingdom is the most-visited theme park in the world', body:'Walt Disney World hosted over 57 million guests across its four parks in 2023, and Magic Kingdom has ranked as the single most-visited theme park in the world for decades. On peak summer days, the park can see over 100,000 visitors in a single day.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Magic Kingdom — Emporium gift shop — Inside the main store on Main Street, look at the decorative ceiling trim near the top of the windows. Three circular decorative medallions on the trim are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+emporium+main+street+ceiling+trim&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'It\'s a Small World was built for the 1964 New York World\'s Fair', body:'"it\'s a small world" was created by Mary Blair and originally opened at the 1964 New York World\'s Fair before moving to Disneyland. The Walt Disney World version opened in 1971 with over 300 dolls representing children from more than 100 countries.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/its-a-small-world/', lt:'it\'s a small world', hm:'Magic Kingdom — it\'s a small world facade — Look at the clock face above the ride entrance. When the clock chimes on the hour, three circular gear elements visible in the mechanisms form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+its+a+small+world+clock+facade+gears&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Disney\'s BoardWalk was themed to a 1930s Atlantic City boardwalk', body:'Disney\'s BoardWalk resort area opened in 1996, themed to an early-20th-century seaside boardwalk. The area includes two hotels, carnival-style midway games, street performers, restaurants, and a promenade along Crescent Lake shared with the EPCOT resort hotels.', link:'https://disneyworld.disney.go.com/resorts/boardwalk-inn/', lt:'Disney\'s BoardWalk Inn', hm:'Disney\'s BoardWalk — Exterior boardwalk — Look at the decorative circular signs hanging from the lamp posts along the boardwalk. Three circular signs on one lamp post grouping form a Mickey silhouette arrangement.', hmLink:'https://www.google.com/search?q=hidden+mickey+disney+boardwalk+lamp+post+signs&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Walt Disney World Railroad uses 100-year-old authentic steam locomotives', body:'The four steam trains of the Walt Disney World Railroad — built between 1916 and 1928 — are genuine narrow-gauge steam engines, not replicas. They circle the full 1.5-mile Magic Kingdom perimeter with stops at Main Street, Frontierland, and Fantasyland.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/walt-disney-world-railroad/', lt:'Walt Disney World Railroad', hm:'Magic Kingdom — Main Street Station — Look at the decorative tile border around the station floor. Three circular tile medallions in the floor pattern near the ticket windows form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+magic+kingdom+railroad+station+floor+tiles&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Disney maintains its animatronics every single night after closing', body:'A dedicated team of engineers and artists works on ride maintenance and animatronic repairs every night after the parks close. Figures like the Shaman of Songs in Na\'vi River Journey — capable of dozens of fluid facial expressions — can require hours of adjustment each week to stay in peak condition.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Magic Kingdom — Pirates of the Caribbean — Look at the waterfall curtain at the ride\'s entrance. Three circular torch flames reflected in the water surface form a Mickey silhouette just before your boat enters the dark cave.', hmLink:'https://www.google.com/search?q=hidden+mickey+pirates+caribbean+waterfall+torch+reflection&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Cinderella\'s Royal Table is one of the hardest dining reservations to get', body:'The character dining experience inside Cinderella Castle is one of the most coveted reservations at Disney World — bookings open exactly 60 days in advance and sell out within minutes. The restaurant has operated inside the castle since the park\'s opening in 1971.', link:'https://disneyworld.disney.go.com/dining/magic-kingdom/cinderellas-royal-table/', lt:'Cinderella\'s Royal Table', hm:'Magic Kingdom — Cinderella\'s Royal Table — Look at the stained glass windows in the dining room. Three circular glass medallions in one window panel are arranged in a Mickey silhouette within the floral design.', hmLink:'https://www.google.com/search?q=hidden+mickey+cinderella+royal+table+stained+glass+windows&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Millennium Falcon: Smugglers Run requires a crew of six', body:'Each Millennium Falcon cockpit seats six riders in three roles — two pilots, two gunners, and two engineers. The ride\'s outcome and score actually change depending on how well each crew member performs their job, making every ride slightly different.', link:'https://disneyworld.disney.go.com/attractions/hollywood-studios/millennium-falcon-smugglers-run/', lt:'Smugglers Run', hm:'Hollywood Studios — Millennium Falcon exterior — Look at the docking clamps on the side of the full-scale Falcon prop. Three circular hydraulic clamp heads on one arm form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+millennium+falcon+exterior+docking+clamps&tbm=isch' },
  { badge:'Park history', bc:'background:#EEEDFE;color:#3C3489', title:'Animal Kingdom almost had a fourth land: Beastly Kingdom', body:'The original Animal Kingdom masterplan included a Beastly Kingdom land featuring mythical creatures — dragons, unicorns, and sea monsters. Budget cuts shelved the land before opening day. Years later, the reserved space became Pandora: The World of Avatar.', link:'https://disneyworld.disney.go.com/destinations/animal-kingdom/', lt:'Animal Kingdom', hm:'Animal Kingdom — Asia land entrance — Look at the carved stone animal relief panels on the entry archway. Three circular stone reliefs in one panel frame form a Mickey silhouette in the detailed stonework.', hmLink:'https://www.google.com/search?q=hidden+mickey+animal+kingdom+asia+entrance+arch+carvings&tbm=isch' },
  { badge:'Ride fact', bc:'background:#FAEEDA;color:#633806', title:'Tomorrowland Transit Authority PeopleMover runs on linear induction motors', body:'The TTA PeopleMover at Magic Kingdom is one of the most peaceful rides in the park — a slow, open-air tour of Tomorrowland with bird\'s-eye views into Space Mountain and the Carousel of Progress. It runs on a linear induction motor system with no moving parts in the propulsion mechanism.', link:'https://disneyworld.disney.go.com/attractions/magic-kingdom/tomorrowland-transit-authority-peoplemover/', lt:'PeopleMover', hm:'Magic Kingdom — PeopleMover — As your vehicle passes through Space Mountain\'s interior, look for three circular track lighting rings in the darkness that overlap to form a Mickey silhouette in the distance.', hmLink:'https://www.google.com/search?q=hidden+mickey+peoplemover+space+mountain+interior+light+rings&tbm=isch' },
  { badge:'Hidden secret', bc:'background:#E1F5EE;color:#085041', title:'Club 33 is a secret members-only club inside the parks', body:'Club 33 is an exclusive, invitation-only membership club originally envisioned by Walt Disney as a space to entertain corporate sponsors. Members pay significant annual dues for access to private lounges with unique dining and perks across all Disney parks worldwide — its entrance is famously unmarked.', link:'https://disneyworld.disney.go.com/', lt:'Disney World', hm:'Magic Kingdom — Near Liberty Square — Look at the ornate iron balcony railings on nearby building facades. Three circular iron scroll motifs in one railing section are arranged in a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+magic+kingdom+iron+balcony+railing+scrolls&tbm=isch' },
  { badge:'Park fact', bc:'background:#FAECE7;color:#712B13', title:'Disney Springs covers 120 acres of free-admission shopping and dining', body:'Disney Springs — formerly Downtown Disney — is a massive entertainment district covering about 120 acres. Admission and parking are free, and the area features over 150 shops and restaurants, live entertainment, and a performing arts venue — all without a park ticket.', link:'https://www.disneysprings.com/', lt:'Disney Springs', hm:'Disney Springs — Marketplace area — Look at the circular mosaic tile installations embedded in the pavement near the waterfront. Three circular medallion tiles of different sizes near one fountain form a Mickey silhouette.', hmLink:'https://www.google.com/search?q=hidden+mickey+disney+springs+marketplace+mosaic+tiles&tbm=isch' },
  { badge:'Ride fact', bc:'background:#E6F1FB;color:#0C447C', title:'Figment the purple dragon is EPCOT\'s most beloved original character', body:'Figment debuted in 1983 as the mascot of EPCOT\'s Imagination pavilion and became one of Disney\'s few original theme park characters to develop a genuinely devoted fan following. The current Journey Into Imagination with Figment ride has been updated multiple times — fans remain fiercely passionate about the character.', link:'https://disneyworld.disney.go.com/attractions/epcot/journey-into-imagination-with-figment/', lt:'Journey Into Imagination', hm:'EPCOT — Journey Into Imagination — Inside the ride, look at Figment\'s lab scene. Three circular beakers of different sizes on one shelf are arranged in a Mickey silhouette among the colorful props.', hmLink:'https://www.google.com/search?q=hidden+mickey+journey+into+imagination+figment+lab+beakers&tbm=isch' },

// Auto-set to today's day in the countdown
const todayDay = Math.floor((new Date() - START) / 86400000);
let currentDay = Math.max(0, Math.min(TOTAL_DAYS - 1, todayDay));

function renderFacts() {
  const idx = currentDay % facts.length;
  const f = facts[idx];
  const next = facts[(idx + 1) % facts.length];
  document.getElementById('day-counter').textContent = 'Day ' + (currentDay + 1) + ' of ' + TOTAL_DAYS;
  document.getElementById('prev-btn').disabled = currentDay === 0;
  document.getElementById('next-btn').disabled = currentDay >= TOTAL_DAYS - 1;
  document.getElementById('facts-container').innerHTML = `
    <div class="fact-card">
      <span class="badge" style="${f.bc}">${f.badge}</span>
      <div class="fact-title">${f.title}</div>
      <div class="fact-body">${f.body}</div>
      <a class="fact-link" href="${f.link}" target="_blank">${f.lt} →</a>
      <div class="hidden-mickey">
        <div class="hm-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="14" r="7" fill="#BA7517"/>
            <circle cx="6" cy="7" r="4" fill="#BA7517"/>
            <circle cx="16" cy="7" r="4" fill="#BA7517"/>
          </svg>
        </div>
        <div>
          <div class="hm-label">Hidden Mickey of the day</div>
          <div class="hm-text">${f.hm}</div>
          <a href="${f.hmLink}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:12px;font-weight:700;color:#BA7517;text-decoration:none;">See photos →</a>
        </div>
      </div>
    </div>
    <div class="fact-card preview">
      <span class="badge" style="${next.bc}">${next.badge}</span>
      <div class="fact-title" style="font-size:14px;">${next.title}</div>
      <div class="preview-label">Tomorrow's fact — keep counting down!</div>
    </div>
  `;
}

function goToDay(n) {
  currentDay = Math.max(0, Math.min(TOTAL_DAYS - 1, n));
  renderFacts();
  document.querySelector('.scroll-area').scrollTop = 0;
}

function changeDay(dir) {
  currentDay = Math.max(0, Math.min(TOTAL_DAYS - 1, currentDay + dir));
  renderFacts();
  document.querySelector('.scroll-area').scrollTop = 0;
}
renderFacts();
